# Vyuh HMI — Docker Compose
# Starts the Rust HMI server with optional TLS.

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./server/config.toml:/app/config.toml:ro
      - server-data:/app/data
      # Uncomment for TLS:
      # - ./certs:/app/certs:ro
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  server-data:
