# Vyuh HMI Server Configuration
# Change this file to connect to different PLCs — zero code changes.

[server]
host = "0.0.0.0"
port = 3000

# JWT signing secret — CHANGE THIS in production! Must be ≥32 chars.
jwt_secret = "vyuh-hmi-production-secret-change-me-2026"

# TLS (optional) — set both paths to enable HTTPS.
# Without TLS, the server will start with a security warning.
# tls_cert = "/path/to/cert.pem"
# tls_key  = "/path/to/key.pem"

[database]
path = "hmi_data.db"

# ── Device List ──────────────────────────────────────────────────
# Each [[devices]] block spawns its own polling task + write channel.
# Add/remove devices here, or use POST /api/devices at runtime.

[[devices]]
id = "plc-01"
name = "Batch Reactor"
address = "127.0.0.1:5020"
protocol = "modbus"
poll_rate_ms = 1000
register_start = 1028
register_count = 8
writable = [1028, 1031, 1032, 1034, 1035]

[[devices]]
id = "plc-02"
name = "Cooling Tower"
address = "127.0.0.1:5021"
protocol = "modbus"
poll_rate_ms = 1000
register_start = 1028
register_count = 8
writable = [1028, 1031, 1032, 1034, 1035]

# Disabled during Phase 8 testing — re-enable when OPC UA sim is stable
[[devices]]
id = "plc-03"
name = "Sterile Filling Line"
address = "opc.tcp://127.0.0.1:4840/"
protocol = "opcua"
poll_rate_ms = 1000
register_start = 1028
register_count = 8
writable = [1028, 1031, 1032, 1034, 1035]
